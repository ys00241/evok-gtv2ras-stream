services:
  # ──────────────────────────────────────────────
  # Backend: Stream Manager + Recording
  # ──────────────────────────────────────────────
  backend:
    build:
      dockerfile: Dockerfile.backend
    network_mode: host
    devices:
      - /dev/video0:/dev/video0
      - /dev/vchiq:/dev/vchiq
    volumes:
      - /tmp/hls:/tmp/hls
      - ./recordings:/recordings
    environment:
      - STREAM_DIR=/tmp/hls
      - RECORD_DIR=/recordings
      - FLASK_ENV=production
    restart: unless-stopped
    stop_grace_period: 10s

  # ──────────────────────────────────────────────
  # Web: nginx → HLS + SPA UI + API proxy
  # ──────────────────────────────────────────────
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - /tmp/hls:/usr/share/nginx/html/hls:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Chromecast ADB Remote (optional — remove if not needed)
  # ──────────────────────────────────────────────
  cc-remote:
    build:
      dockerfile: Dockerfile.cc
    network_mode: host
    environment:
      - CC_HOST=192.168.0.???
      - ADB_PORT=5555
    restart: unless-stopped
