services:
  # ──────────────────────────────────────────────
  # Backend: Stream Manager + Recording
  # ──────────────────────────────────────────────
  backend:
    image: ghcr.io/ys00241/evok-gtv2ras-stream:latest
    network_mode: host
    devices: []
    volumes:
      - /tmp/hls:/hls
      - ./recordings:/recordings
    environment:
      - STREAM_DIR=/hls
      - RECORD_DIR=/recordings
      - FLASK_ENV=production
      - HW_ENCODER=h264_v4l2m2m
    command: ["python", "app.py"]
    restart: unless-stopped
    stop_grace_period: 10s

  # ──────────────────────────────────────────────
  # Web: nginx → HLS + SPA UI + API proxy
  # Portainer-safe: directory mounts only
  # ──────────────────────────────────────────────
  web:
    image: nginx:alpine
    ports:
      - "8964:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - /tmp/hls:/hls:ro
    command:
      - /bin/sh
      - -c
      - |
        cp /usr/share/nginx/html/nginx.conf /etc/nginx/nginx.conf
        exec nginx -c /etc/nginx/nginx.conf -g 'daemon off;'
    depends_on:
      - backend
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Chromecast ADB Remote (optional)
  # ──────────────────────────────────────────────
  cc-remote:
    image: ghcr.io/ys00241/evok-gtv2ras-stream:latest
    network_mode: host
    environment:
      - CC_HOST=192.168.0.???
      - ADB_PORT=5555
    command: ["python", "cc_remote.py"]
    restart: unless-stopped
