services:
  # ──────────────────────────────────────────────
  # Backend: Stream Manager + Recording + Web UI
  # Flask serves HLS segments + API + static UI
  # ──────────────────────────────────────────────
  backend:
    image: ghcr.io/ys00241/evok-gtv2ras-stream:latest
    ports:
      - "5000:5000"
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - /tmp/hls:/hls
      - ./recordings:/recordings
    environment:
      - STREAM_DIR=/hls
      - RECORD_DIR=/recordings
      - FLASK_ENV=production
      - HW_ENCODER=h264_v4l2m2m
    command: ["python", "app.py"]
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - tv-stream-net

  # ──────────────────────────────────────────────
  # Web: nginx reverse proxy → backend:5000
  # ──────────────────────────────────────────────
  web:
    image: nginx:alpine
    ports:
      - "8964:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tv-stream-net
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf << 'NGINXEOF'
        server {
            listen 80;
            location / {
                proxy_pass http://backend:5000;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_read_timeout 30;
                proxy_connect_timeout 10;
            }
        }
        NGINXEOF
        exec nginx -g 'daemon off;'

  # ──────────────────────────────────────────────
  # Chromecast ADB Remote (optional, network_mode host for mDNS)
  # ──────────────────────────────────────────────
  cc-remote:
    image: ghcr.io/ys00241/evok-gtv2ras-stream:latest
    network_mode: host
    environment:
      - CC_HOST=192.168.0.???
      - ADB_PORT=5555
    command: ["python", "cc_remote.py"]
    restart: unless-stopped
    profiles:
      - donotstart

networks:
  tv-stream-net:
    driver: bridge
