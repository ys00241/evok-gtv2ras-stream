services:
  # ──────────────────────────────────────────────
  # Backend: Stream Manager + Recording + Web UI
  # Flask serves EVERYTHING — HLS, static UI, API
  # No nginx bind mount = no 403
  # ──────────────────────────────────────────────
  backend:
    image: ghcr.io/ys00241/evok-gtv2ras-stream:latest
    network_mode: host
    devices: []
    volumes:
      - /tmp/hls:/hls
      - ./recordings:/recordings
    environment:
      - STREAM_DIR=/hls
      - RECORD_DIR=/recordings
      - FLASK_ENV=production
      - HW_ENCODER=h264_v4l2m2m
    command: ["python", "app.py"]
    restart: unless-stopped
    stop_grace_period: 10s

  # ──────────────────────────────────────────────
  # Web: nginx → pure reverse proxy to backend
  # No static files, no bind mounts = no 403
  # ──────────────────────────────────────────────
  web:
    image: nginx:alpine
    ports:
      - "8964:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Chromecast ADB Remote (optional)
  # ──────────────────────────────────────────────
  cc-remote:
    image: ghcr.io/ys00241/evok-gtv2ras-stream:latest
    network_mode: host
    environment:
      - CC_HOST=192.168.0.???
      - ADB_PORT=5555
    command: ["python", "cc_remote.py"]
    restart: unless-stopped
