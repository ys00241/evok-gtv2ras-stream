services:
  # ──────────────────────────────────────────────
  # Backend: Stream Manager + Recording
  # Pulls from ghcr.io — cross-platform image
  # ──────────────────────────────────────────────
  backend:
    image: ghcr.io/ys00241/evok-gtv2ras-stream:latest
    network_mode: host
    devices: []
    volumes:
      - /tmp/hls:/tmp/hls
      - ./recordings:/recordings
    environment:
      - STREAM_DIR=/tmp/hls
      - RECORD_DIR=/recordings
      - FLASK_ENV=production
      - HW_ENCODER=h264_v4l2m2m
    command: ["python", "app.py"]
    restart: unless-stopped
    stop_grace_period: 10s

  # ──────────────────────────────────────────────
  # Web: nginx → HLS + SPA UI + API proxy
  # ──────────────────────────────────────────────
  web:
    image: nginx:alpine
    ports:
      - "8964:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
      - /tmp/hls:/usr/share/nginx/html/hls:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Chromecast ADB Remote (optional — remove if not needed)
  # ──────────────────────────────────────────────
  cc-remote:
    image: ghcr.io/ys00241/evok-gtv2ras-stream:latest
    network_mode: host
    environment:
      - CC_HOST=192.168.0.???
      - ADB_PORT=5555
    command: ["python", "cc_remote.py"]
    restart: unless-stopped
