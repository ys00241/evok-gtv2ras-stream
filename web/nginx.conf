server {
    listen 80;
    server_name _;

    # ─── HLS Stream segments ───
    location /hls/ {
        alias /usr/share/nginx/html/hls/;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        expires -1;
    }

    # ─── Recorded Files ───
    location /recordings/ {
        alias /recordings/;
        add_header Access-Control-Allow-Origin "*";
    }

    # ─── API: Stream + Record → backend:5000 ───
    location /api/stream/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
    }
    location /api/channel/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
    }
    location /api/record/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
    }
    location /api/system/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
    }
    location /api/health {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
    }

    # ─── API: Chromecast Remote → cc-remote:5001 (optional) ───
    location /api/cc/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10;
        # Fail gracefully if cc-remote isn't deployed
        error_page 502 503 504 = @cc_unavailable;
    }
    location @cc_unavailable {
        return 200 '{"status":"error","message":"CC Remote service not deployed","cc_available":false}';
        add_header Content-Type application/json;
    }

    # ─── SPA: serve index.html for all other routes ───
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
